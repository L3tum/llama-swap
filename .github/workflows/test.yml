name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Tidy modules
        run: go mod tidy

      - name: Check for uncommitted changes
        run: |
          if ! git diff --quiet go.mod go.sum; then
            echo "::error::go mod tidy produced changes. Run 'go mod tidy' locally and commit go.mod/go.sum."
            git diff go.mod go.sum
            exit 1
          fi

      - name: Run tests
        run: make test-all
